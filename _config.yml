# 站点基本信息
title: "你的名字 · 学术主页"
email: your.email@example.com
description: >-
  这是 [你的名字] 的个人学术主页，包含研究、论文、项目和独立笔记。
baseurl: ""  # 如果部署在子路径，比如 /blog，就填 "/blog"
url: "https://againle.github.io"  # 替换成你的 GitHub Pages 地址

# 作者信息
author:
  name: "你的名字"
  affiliation: "XX 大学 · XX 学院"
  github: "你的用户名"
  twitter: "你的推特账号（可选）"

# 构建配置
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/  # 文章链接格式

# 主题（可选）
# 如果你想用现成主题，可以取消注释下面一行
# theme: minima

# 排除文件（不打包到生成目录）
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md