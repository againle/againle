<footer class="site-footer">
    <div class="wrapper">
        <p>
            &copy; {{ site.time | date: '%Y' }} {{ site.author.name }} · 
            用 <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> 和 
            <a href="https://pages.github.com/" target="_blank">GitHub Pages</a> 搭建
        </p>
        <p class="footer-links">
            <a href="mailto:{{ site.email }}">📧 {{ site.email }}</a>
            <a href="https://github.com/{{ site.author.github }}" target="_blank">🐙 GitHub</a>
            {% if site.author.twitter %}
            <a href="https://twitter.com/{{ site.author.twitter }}" target="_blank">🐦 Twitter</a>
            {% endif %}
        </p>
    </div>
</footer>
